server {
    listen 80;
    server_name physics.scalebuild.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name physics.scalebuild.ai;
    ssl_certificate /etc/letsencrypt/live/physics.scalebuild.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physics.scalebuild.ai/privkey.pem;
    large_client_header_buffers 4 32k;

    location / {
        proxy_pass http://127.0.0.1:5679;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_read_timeout 600s;
    }
}
